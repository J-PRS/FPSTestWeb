<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Three.js FPS — Tribes/Quake Style</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #000; overflow: hidden; font-family: 'Courier New', monospace; }
    canvas { display: block; }
    #overlay {
      position: absolute; inset: 0;
      display: none; align-items: center; justify-content: center;
      background: rgba(0,0,0,0.85);
      color: #0ff;
      z-index: 10;
    }
    #overlay-inner {
      text-align: center;
      border: 1px solid #0ff;
      padding: 40px 60px;
      background: rgba(0,20,40,0.9);
    }
    #overlay h1 { font-size: 2.4rem; letter-spacing: 0.15em; margin-bottom: 8px; color: #fff; }
    #overlay .sub { font-size: 0.9rem; color: #08f; margin-bottom: 24px; letter-spacing: 0.1em; }
    #overlay .controls { font-size: 0.78rem; color: #8cf; line-height: 1.9; text-align: left; }
    #overlay .controls span { color: #fff; font-weight: bold; }
    #overlay button {
      margin-top: 28px;
      padding: 12px 36px;
      background: #0af;
      color: #000;
      border: none;
      font-family: 'Courier New', monospace;
      font-size: 1rem;
      font-weight: bold;
      letter-spacing: 0.12em;
      cursor: pointer;
      text-transform: uppercase;
    }
    #overlay button:hover { background: #fff; }
  </style>
</head>
<body>
  <div id="overlay">
    <div id="overlay-inner">
      <h1>VORTEX FPS</h1>
      <div class="sub">Three.js &bull; Tribes/Quake Style</div>
      <div class="controls">
        <span>WASD</span> — Move &nbsp;&nbsp; <span>SPACE</span> — Jump / Ski (hold on ground)<br>
        <span>RMB</span> — Jetpack &nbsp;&nbsp; <span>LMB</span> — Fire rocket<br>
        <span>MOUSE</span> — Look &nbsp;&nbsp; <span>R</span> — Reload<br>
        <br>
        Shoot the bouncing spheres!<br>
        Rocket-jump &amp; jetpack to reach high ground.
      </div>
      <button id="pixel-toggle" style="margin-top: 16px; padding: 8px 24px; font-size: 0.85rem;">TOGGLE PIXELATED</button>
      <button id="start-btn">CLICK TO PLAY</button>
    </div>
  </div>
  <script type="module" src="src/main.ts"></script>
</body>
</html>
