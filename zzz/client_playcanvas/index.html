<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FPS - PlayCanvas</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            overflow: hidden;
            background: #000;
        }
        canvas {
            display: block;
            width: 100vw;
            height: 100vh;
        }
        #ui {
            position: absolute;
            top: 10px;
            left: 10px;
            color: white;
            font-family: monospace;
            font-size: 14px;
            pointer-events: none;
        }
    </style>
</head>
<body>
    <canvas id="application"></canvas>
    <div id="ui">
        <div>FPS: <span id="fps">0</span></div>
        <div>Ping: <span id="ping">0</span>ms</div>
        <div>Players: <span id="players">0</span></div>
    </div>
    <script type="module" src="/src/main.ts"></script>
</body>
</html>
