<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sprunk Engine FPS Game</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    body {
      overflow: hidden;
      background: #000;
    }
    #game-canvas {
      width: 100vw;
      height: 100vh;
      display: block;
    }
    #ui {
      position: absolute;
      top: 10px;
      left: 10px;
      color: white;
      font-family: Arial, sans-serif;
      font-size: 14px;
      pointer-events: none;
    }
    #crosshair {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      width: 20px;
      height: 20px;
      pointer-events: none;
    }
    #crosshair::before, #crosshair::after {
      content: '';
      position: absolute;
      background: white;
    }
    #crosshair::before {
      width: 2px;
      height: 20px;
      left: 9px;
    }
    #crosshair::after {
      width: 20px;
      height: 2px;
      top: 9px;
    }
    #start-overlay {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0, 0, 0, 0.8);
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      color: white;
      font-family: Arial, sans-serif;
      cursor: pointer;
      z-index: 100;
    }
    #start-overlay h1 {
      font-size: 48px;
      margin-bottom: 20px;
    }
    #start-overlay p {
      font-size: 18px;
      opacity: 0.8;
    }
    #start-overlay.hidden {
      display: none;
    }
  </style>
</head>
<body>
  <canvas id="game-canvas"></canvas>
  <div id="start-overlay">
    <h1>Click to Start</h1>
    <p>WASD to move | Mouse to look | Space to jump</p>
  </div>
  <div id="ui">
    <div>FPS: <span id="fps">0</span></div>
    <div>Position: <span id="position">0, 0, 0</span></div>
  </div>
  <div id="crosshair"></div>
  <script type="module" src="/src/main.ts"></script>
</body>
</html>
